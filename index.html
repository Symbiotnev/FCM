<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>imfuyoteam</title>
<style>
  :root{
    --bg: #0f1410;
    --panel: #161d17;
    --accent: #7fdc8f;
    --accent-dim: #3f6b48;
    --text: #eef4ee;
    --text-dim: #9fb3a3;
    --border: #243025;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding: 24px;
  }
  .card{
    width:100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 32px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    text-align:center;
  }
  .brand{
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
  }
  h1{
    font-size: 22px;
    margin: 0 0 8px;
    font-weight: 600;
  }
  p.sub{
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 28px;
    line-height: 1.5;
  }
  button{
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: 8px;
  }
  #google-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    width:100%;
    padding: 12px 16px;
    background: #fff;
    color: #1f1f1f;
    font-size: 15px;
    font-weight: 500;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  #google-btn:hover{
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
  #google-btn svg{ width:18px; height:18px; }

  #error-msg{
    margin-top: 16px;
    font-size: 13px;
    color: #e08585;
    display:none;
  }

  /* dashboard */
  #dashboard-view{ display:none; }
  .avatar{
    width: 76px; height:76px;
    border-radius: 50%;
    border: 2px solid var(--accent-dim);
    object-fit: cover;
    margin-bottom: 20px;
  }
  .greeting{
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .greeting span{ color: var(--accent); }
  .email{
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 28px;
  }
  #signout-btn{
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
  }
  #signout-btn:hover{
    border-color: var(--accent-dim);
    color: var(--text);
  }
  .hidden{ display:none !important; }
</style>
</head>
<body>

  <div class="card" id="login-view">
    <div class="brand">imfuyoteam</div>
    <h1>Sign in</h1>
    <p class="sub">Continue with your Google account to open your dashboard.</p>
    <button id="google-btn">
      <svg viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 6 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.6 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 6 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.1-5.1l-6.5-5.4C29.4 35.4 26.8 36 24 36c-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.6 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4 5.5l6.5 5.4C41.5 35.9 44 30.4 44 24c0-1.2-.1-2.4-.4-3.5z"/>
      </svg>
      Sign in with Google
    </button>
    <div id="error-msg"></div>
  </div>

  <div class="card" id="dashboard-view">
    <img id="user-photo" class="avatar" src="" alt="" />
    <p class="greeting">Hello, <span id="user-name"></span></p>
    <p class="email" id="user-email"></p>
    <button id="signout-btn">Sign out</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHlIsEzBKlOr_kNDwJN4mcmcC7a2U0Q6Q",
      authDomain: "imfuyoteam.firebaseapp.com",
      projectId: "imfuyoteam",
      storageBucket: "imfuyoteam.firebasestorage.app",
      messagingSenderId: "192603437552",
      appId: "1:192603437552:web:540e9a71f405f30f4a0535",
      measurementId: "G-S7X1ZN8L48"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginView = document.getElementById("login-view");
    const dashboardView = document.getElementById("dashboard-view");
    const googleBtn = document.getElementById("google-btn");
    const signoutBtn = document.getElementById("signout-btn");
    const errorMsg = document.getElementById("error-msg");
    const userName = document.getElementById("user-name");
    const userEmail = document.getElementById("user-email");
    const userPhoto = document.getElementById("user-photo");

    googleBtn.addEventListener("click", async () => {
      errorMsg.style.display = "none";
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error(err);
        errorMsg.textContent = "Sign-in failed: " + err.message;
        errorMsg.style.display = "block";
      }
    });

    signoutBtn.addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginView.classList.add("hidden");
        dashboardView.style.display = "block";
        userName.textContent = user.displayName || "there";
        userEmail.textContent = user.email || "";
        userPhoto.src = user.photoURL || "";
      } else {
        loginView.classList.remove("hidden");
        dashboardView.style.display = "none";
      }
    });
  </script>

</body>
</html>
